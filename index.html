<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Tool</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #0f0f0f, #050505);
    font-family: Arial, sans-serif;
}

/* CARD */
.card{
    width:320px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,255,140,0.3);
    box-shadow: 0 0 25px rgba(0,255,140,0.2);
    border-radius:20px;
    padding:20px;
    text-align:center;
    backdrop-filter: blur(10px);
}

/* TITLE */
h2{
    color:#00ff9d;
    margin-bottom:15px;
    letter-spacing:2px;
}

/* TEXTAREA */
textarea{
    width:100%;
    height:140px;
    background:#0a0a0a;
    color:#00ff9d;
    border:1px solid #00ff9d55;
    border-radius:12px;
    padding:10px;
    resize:none;
    font-family: monospace;
    font-size:13px;
    outline:none;
}

/* BUTTON */
button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background: linear-gradient(90deg,#00ff9d,#00c3ff);
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform: scale(1.05);
}

/* MESSAGE */
#msg{
    margin-top:10px;
    font-size:14px;
    opacity:0;
    transform: translateY(10px);
    transition:0.4s;
}

/* SUCCESS ANIMATION */
.show{
    opacity:1 !important;
    transform: translateY(0px) !important;
}

/* BUTTON FLASH EFFECT */
.flash{
    animation: flash 0.4s;
}

@keyframes flash{
    0%{transform:scale(1);}
    25%{transform:scale(1.1) rotate(1deg);}
    50%{transform:scale(0.95) rotate(-1deg);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="card">
    <h2>COPY TOOL</h2>

    <textarea id="text" readonly>loadstring(game:HttpGet("https://pastefy.app/XOTD2csj/raw"))()</textarea>

    <button id="btn" onclick="copyText()">COPY</button>

    <div id="msg"></div>
</div>

<script>
function copyText(){
    const text = document.getElementById("text").value;
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    navigator.clipboard.writeText(text).then(()=>{

        // زر أنيميشن
        btn.classList.add("flash");
        btn.innerText = "COPIED ✔";

        // رسالة جميلة
        msg.innerText = "✔ Copied successfully!";
        msg.style.color = "#00ff9d";
        msg.classList.add("show");

        // رجوع الوضع الطبيعي
        setTimeout(()=>{
            btn.innerText = "COPY";
            btn.classList.remove("flash");
        }, 1500);

    }).catch(()=>{
        msg.innerText = "✖ Copy failed!";
        msg.style.color = "red";
        msg.classList.add("show");
    });
}
</script>

</body>
</html>
